<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="146" y1="112" x2="1420" y2="804" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#10233B"/>
      <stop offset="1" stop-color="#0C1524"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1100" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16263F"/>
      <stop offset="1" stop-color="#0D1727"/>
    </linearGradient>
    <linearGradient id="accent" x1="230" y1="250" x2="1260" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5A3"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="120" y="120" width="1360" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="35" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="38" fill="url(#bg)"/>
  <circle cx="1408" cy="122" r="196" fill="#0EA5A3" fill-opacity="0.07"/>
  <circle cx="219" cy="770" r="196" fill="#38BDF8" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="160" y="170" width="1280" height="560" rx="34" fill="url(#card)" stroke="rgba(148, 163, 184, 0.18)"/>
  </g>

  <rect x="214" y="218" width="88" height="88" rx="24" fill="url(#accent)"/>
  <rect x="238" y="242" width="40" height="40" rx="12" fill="#F8FAFC" fill-opacity="0.96"/>
  <text x="338" y="267" fill="#F8FAFC" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="700">NovaGuard</text>
  <text x="338" y="320" fill="#93C5FD" font-size="28" font-family="Arial, Helvetica, sans-serif">Premium Discord automation for elegant communities</text>

  <text x="214" y="400" fill="#E2E8F0" font-size="24" font-family="Arial, Helvetica, sans-serif">Slash commands, setup wizard, GitHub feed, health alerts, backups and Raspberry Pi hosting</text>

  <g>
    <rect x="214" y="458" width="286" height="132" rx="24" fill="#0D1B2E" stroke="#1F3B5C"/>
    <text x="244" y="505" fill="#F8FAFC" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Setup Wizard</text>
    <text x="244" y="546" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">Dropdown flow, channel picker,</text>
    <text x="244" y="575" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">config export and reset</text>
  </g>

  <g>
    <rect x="528" y="458" width="286" height="132" rx="24" fill="#0D1B2E" stroke="#1F3B5C"/>
    <text x="558" y="505" fill="#F8FAFC" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">GitHub Intelligence</text>
    <text x="558" y="546" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">Profile cards, repo health,</text>
    <text x="558" y="575" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">live activity and changelogs</text>
  </g>

  <g>
    <rect x="842" y="458" width="286" height="132" rx="24" fill="#0D1B2E" stroke="#1F3B5C"/>
    <text x="872" y="505" fill="#F8FAFC" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Pi-Friendly Ops</text>
    <text x="872" y="546" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">SQLite, PM2, backups,</text>
    <text x="872" y="575" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">lag monitor and recovery</text>
  </g>

  <g>
    <rect x="1156" y="458" width="220" height="132" rx="24" fill="#0D1B2E" stroke="#1F3B5C"/>
    <text x="1186" y="505" fill="#F8FAFC" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">62+</text>
    <text x="1186" y="548" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">slash commands</text>
    <text x="1186" y="577" fill="#A5B4FC" font-size="20" font-family="Arial, Helvetica, sans-serif">15 command cogs</text>
  </g>

  <rect x="214" y="635" width="1162" height="42" rx="21" fill="#0B1320" stroke="#17324F"/>
  <rect x="228" y="648" width="362" height="16" rx="8" fill="url(#accent)"/>
  <text x="610" y="662" fill="#BFDBFE" font-size="18" font-family="Arial, Helvetica, sans-serif">Setup • Monitor • Ship • Recover</text>
</svg>
