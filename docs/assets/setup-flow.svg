<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" rx="34" fill="#08111F"/>
  <text x="84" y="106" fill="#F8FAFC" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">NovaGuard setup flow</text>
  <text x="84" y="150" fill="#93C5FD" font-size="24" font-family="Arial, Helvetica, sans-serif">From fresh invite to polished server configuration in a few clean steps</text>

  <rect x="84" y="216" width="296" height="372" rx="28" fill="#101B2D" stroke="#22344F"/>
  <circle cx="144" cy="278" r="30" fill="#0EA5A3"/>
  <text x="135" y="287" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">1</text>
  <text x="192" y="284" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Invite bot</text>
  <text x="120" y="350" fill="#BFDBFE" font-size="22" font-family="Arial, Helvetica, sans-serif">Bring NovaGuard into the server with the right permissions and intents already enabled.</text>

  <rect x="426" y="216" width="296" height="372" rx="28" fill="#101B2D" stroke="#22344F"/>
  <circle cx="486" cy="278" r="30" fill="#8B5CF6"/>
  <text x="477" y="287" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">2</text>
  <text x="534" y="284" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Run /setup</text>
  <text x="462" y="350" fill="#DDD6FE" font-size="22" font-family="Arial, Helvetica, sans-serif">Use the setup dashboard to choose updates, logs, GitHub feed, error digest and community channels.</text>

  <rect x="768" y="216" width="296" height="372" rx="28" fill="#101B2D" stroke="#22344F"/>
  <circle cx="828" cy="278" r="30" fill="#EC4899"/>
  <text x="819" y="287" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">3</text>
  <text x="876" y="284" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Verify /doctor</text>
  <text x="804" y="350" fill="#FBCFE8" font-size="22" font-family="Arial, Helvetica, sans-serif">Check health, permissions, GitHub access, database state, event-loop lag and backup readiness.</text>

  <rect x="1110" y="216" width="406" height="372" rx="28" fill="#101B2D" stroke="#22344F"/>
  <circle cx="1170" cy="278" r="30" fill="#F59E0B"/>
  <text x="1161" y="287" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">4</text>
  <text x="1218" y="284" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Ship with confidence</text>
  <text x="1146" y="350" fill="#FDE68A" font-size="22" font-family="Arial, Helvetica, sans-serif">Let automatic updates, GitHub cards, scheduled backups and error digests keep the server feeling alive and well-maintained.</text>

  <path d="M380 402H426" stroke="#385A8A" stroke-width="6" stroke-linecap="round"/>
  <path d="M722 402H768" stroke="#385A8A" stroke-width="6" stroke-linecap="round"/>
  <path d="M1064 402H1110" stroke="#385A8A" stroke-width="6" stroke-linecap="round"/>
</svg>
