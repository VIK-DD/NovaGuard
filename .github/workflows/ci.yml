name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall -q bot.py core cogs

      - name: Import smoke test
        run: python -c "import bot; print('cogs', len(bot.COGS))"

      - name: Dashboard API smoke test
        run: python tests/test_webserver.py

      - name: Security audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt

  # Proves the hash-locked lockfile installs reproducibly (what the Pi uses).
  locked-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install from the hash-locked lockfile
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock

      - name: Import smoke test (locked versions)
        run: python -c "import bot; print('cogs', len(bot.COGS))"
